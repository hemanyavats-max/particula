<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARTICULA — Audio Visualizer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;600&family=Space+Mono:wght@400;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --col-bg: #010206;
    --col-ui-bg: rgba(2, 6, 16, 0.88);
    --col-border: rgba(0, 255, 220, 0.15);
    --col-accent: #00ffdc;
    --col-accent2: #ff00c8;
    --col-text: rgba(180, 255, 245, 0.9);
    --col-text-dim: rgba(0, 200, 180, 0.45);
  }

  html, body {
    width: 100%; height: 100%;
    background: var(--col-bg);
    overflow: hidden;
    font-family: 'Rajdhani', sans-serif;
    color: var(--col-text);
    cursor: crosshair;
  }

  canvas {
    position: fixed;
    inset: 0;
    display: block;
  }

  /* ── OVERLAY UI ── */
  #ui {
    position: fixed;
    inset: 0;
    pointer-events: none;
    z-index: 10;
  }

  /* ── TITLE ── */
  #title-block {
    position: absolute;
    top: 32px; left: 40px;
    pointer-events: none;
  }
  #title-block h1 {
    font-family: 'Space Mono', monospace;
    font-size: clamp(18px, 2.5vw, 28px);
    font-weight: 700;
    letter-spacing: 0.35em;
    background: linear-gradient(90deg, var(--col-accent), var(--col-accent2));
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    text-transform: uppercase;
  }
  #title-block p {
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--col-text-dim);
    margin-top: 4px;
    text-transform: uppercase;
  }

  /* ── STATUS BAR ── */
  #status {
    position: absolute;
    top: 32px; right: 40px;
    display: flex;
    align-items: center;
    gap: 8px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    color: var(--col-text-dim);
    text-transform: uppercase;
  }
  #status-dot {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: #333;
    transition: background 0.3s, box-shadow 0.3s;
  }
  #status-dot.active {
    background: var(--col-accent);
    box-shadow: 0 0 10px var(--col-accent);
    animation: pulse-dot 1.5s ease-in-out infinite;
  }
  @keyframes pulse-dot {
    0%,100% { box-shadow: 0 0 6px var(--col-accent); }
    50%      { box-shadow: 0 0 16px var(--col-accent), 0 0 30px var(--col-accent); }
  }

  /* ── CONTROLS PANEL ── */
  #controls {
    position: absolute;
    bottom: 32px; left: 40px;
    pointer-events: all;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .ctrl-row {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .ctrl-label {
    font-family: 'Space Mono', monospace;
    font-size: 9px;
    letter-spacing: 0.2em;
    color: var(--col-text-dim);
    text-transform: uppercase;
    width: 56px;
  }

  .ctrl-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 120px; height: 3px;
    background: rgba(80,180,255,0.15);
    border-radius: 2px;
    outline: none;
    cursor: pointer;
  }
  .ctrl-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    width: 12px; height: 12px;
    border-radius: 50%;
    background: var(--col-accent);
    box-shadow: 0 0 8px var(--col-accent);
    cursor: grab;
    transition: transform 0.1s;
  }
  .ctrl-slider:active::-webkit-slider-thumb { transform: scale(1.4); }

  .ctrl-val {
    font-family: 'Space Mono', monospace;
    font-size: 10px;
    color: var(--col-accent);
    min-width: 32px;
  }

  /* ── BUTTONS ── */
  #btn-row {
    position: absolute;
    bottom: 32px; right: 40px;
    display: flex;
    gap: 12px;
    pointer-events: all;
  }

  .btn {
    background: var(--col-ui-bg);
    border: 1px solid var(--col-border);
    border-radius: 4px;
    padding: 10px 22px;
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.15em;
    text-transform: uppercase;
    color: var(--col-text);
    cursor: pointer;
    transition: border-color 0.2s, color 0.2s, box-shadow 0.2s, transform 0.1s;
  }
  .btn:hover {
    border-color: var(--col-accent);
    color: var(--col-accent);
    box-shadow: 0 0 16px rgba(0,212,255,0.2);
    transform: translateY(-1px);
  }
  .btn.primary {
    border-color: rgba(0,212,255,0.4);
    color: var(--col-accent);
  }
  .btn:active { transform: scale(0.97); }

  /* ── FREQ BARS ── */
  #freq-bar {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 60px;
    pointer-events: none;
    opacity: 0.45;
  }

  /* ── ONBOARDING OVERLAY ── */
  #onboard {
    position: fixed;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 20px;
    z-index: 20;
    background: radial-gradient(ellipse at center, rgba(2,4,8,0.6) 0%, rgba(2,4,8,0.95) 100%);
    backdrop-filter: blur(4px);
    transition: opacity 0.8s;
  }
  #onboard.hidden { opacity: 0; pointer-events: none; }

  #onboard h2 {
    font-family: 'Space Mono', monospace;
    font-size: clamp(28px, 5vw, 56px);
    font-weight: 700;
    letter-spacing: 0.3em;
    text-align: center;
    background: linear-gradient(135deg, var(--col-accent) 0%, var(--col-accent2) 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    animation: shimmer 3s ease-in-out infinite alternate;
  }
  @keyframes shimmer {
    from { filter: brightness(1); }
    to   { filter: brightness(1.3) drop-shadow(0 0 20px rgba(0,212,255,0.5)); }
  }
  #onboard p {
    font-size: clamp(13px, 1.5vw, 16px);
    letter-spacing: 0.1em;
    color: var(--col-text-dim);
    text-align: center;
    max-width: 480px;
    line-height: 1.8;
  }
  #onboard .hint {
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    color: rgba(80,150,200,0.5);
    letter-spacing: 0.15em;
    text-transform: uppercase;
    margin-top: 8px;
  }
  .start-btn {
    margin-top: 10px;
    background: transparent;
    border: 1px solid var(--col-accent);
    border-radius: 4px;
    padding: 14px 48px;
    font-family: 'Space Mono', monospace;
    font-size: 13px;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    color: var(--col-accent);
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: box-shadow 0.3s, transform 0.2s;
  }
  .start-btn::before {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(90deg, transparent, rgba(0,212,255,0.1), transparent);
    transform: translateX(-100%);
    animation: scan 2s linear infinite;
  }
  @keyframes scan {
    to { transform: translateX(100%); }
  }
  .start-btn:hover {
    box-shadow: 0 0 30px rgba(0,212,255,0.3), inset 0 0 20px rgba(0,212,255,0.05);
    transform: scale(1.03);
  }

  #beat-flash {
    position: fixed;
    inset: 0;
    background: 
      radial-gradient(ellipse at 40% 50%, rgba(0,255,220,0.07) 0%, transparent 60%),
      radial-gradient(ellipse at 60% 50%, rgba(255,0,200,0.07) 0%, transparent 60%);
    pointer-events: none;
    opacity: 0;
    z-index: 5;
    transition: opacity 0.05s;
  }
  #beat-flash.flash { opacity: 1; }

  /* ── TOOLTIP ── */
  #tooltip {
    position: absolute;
    top: 50%; left: 50%;
    transform: translate(-50%, -50%);
    font-family: 'Space Mono', monospace;
    font-size: 11px;
    letter-spacing: 0.2em;
    color: var(--col-text-dim);
    text-transform: uppercase;
    pointer-events: none;
    opacity: 0;
    transition: opacity 1s;
    text-align: center;
    line-height: 1.8;
  }
  #tooltip.show { opacity: 1; }
</style>
</head>
<body>

<canvas id="c"></canvas>
<canvas id="freq-bar"></canvas>

<div id="beat-flash"></div>

<!-- ONBOARDING -->
<div id="onboard">
  <h2>PARTICULA</h2>
  <p>A physics-based particle universe that reacts to your audio in real time.</p>
  <p class="hint">Works with Spotify · YouTube · Any system audio</p>
  <button class="start-btn" id="btn-start">Initialize System</button>
</div>

<!-- UI LAYER -->
<div id="ui">
  <div id="title-block">
    <h1>Particula</h1>
    <p>Particle Physics Visualizer</p>
  </div>

  <div id="status">
    <div id="status-dot"></div>
    <span id="status-text">Standby</span>
  </div>

  <div id="controls">
    <div class="ctrl-row">
      <span class="ctrl-label">Gravity</span>
      <input type="range" class="ctrl-slider" id="sl-gravity" min="0" max="100" value="40">
      <span class="ctrl-val" id="val-gravity">40</span>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">Particles</span>
      <input type="range" class="ctrl-slider" id="sl-count" min="1000" max="15000" step="500" value="6000">
      <span class="ctrl-val" id="val-count">6k</span>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">Trails</span>
      <input type="range" class="ctrl-slider" id="sl-trail" min="1" max="20" value="8">
      <span class="ctrl-val" id="val-trail">8</span>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">Force</span>
      <input type="range" class="ctrl-slider" id="sl-force" min="10" max="200" value="80">
      <span class="ctrl-val" id="val-force">80</span>
    </div>
  </div>

  <div id="btn-row">
    <button class="btn" id="btn-mic">Microphone</button>
    <button class="btn primary" id="btn-system">System Audio</button>
  </div>

  <div id="tooltip"></div>
</div>

<script>
// ─────────────────────────────────────────────
// PARTICULA — Audio Visualizer
// ─────────────────────────────────────────────

const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const freqCanvas = document.getElementById('freq-bar');
const fctx = freqCanvas.getContext('2d');

let W, H;
function resize() {
  W = canvas.width = freqCanvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  freqCanvas.height = 60;
}
resize();
window.addEventListener('resize', () => { resize(); initParticles(); });

// ── AUDIO ──
let audioCtx, analyser, dataArray, freqBinCount;
let audioActive = false;
let bass = 0, mids = 0, highs = 0, vol = 0;
let beatEnergy = 0, beatHistory = [], lastBeat = 0;

function setupAnalyser(stream) {
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const source = audioCtx.createMediaStreamSource(stream);
  analyser = audioCtx.createAnalyser();
  analyser.fftSize = 2048;
  analyser.smoothingTimeConstant = 0.82;
  freqBinCount = analyser.frequencyBinCount;
  dataArray = new Uint8Array(freqBinCount);
  source.connect(analyser);
  audioActive = true;
  document.getElementById('status-dot').classList.add('active');
}

function avg(arr, s, e) {
  let sum = 0;
  for (let i = s; i < e; i++) sum += arr[i];
  return sum / (e - s) / 255;
}

function analyzeAudio() {
  if (!analyser) return;
  analyser.getByteFrequencyData(dataArray);
  bass  = avg(dataArray, 0,   12);
  mids  = avg(dataArray, 12,  120);
  highs = avg(dataArray, 120, 280);
  vol   = avg(dataArray, 0,   280);

  // beat detection
  beatHistory.push(bass);
  if (beatHistory.length > 60) beatHistory.shift();
  const avgBass = beatHistory.reduce((a,b) => a+b, 0) / beatHistory.length;
  if (bass > avgBass * 1.45 && Date.now() - lastBeat > 200) {
    lastBeat = Date.now();
    onBeat();
  }
}

function onBeat() {
  const flash = document.getElementById('beat-flash');
  flash.classList.add('flash');
  setTimeout(() => flash.classList.remove('flash'), 80);
  // chromatic aberration burst
  chromaOffset = 3 + bass * 8;
  // random glitch
  if (Math.random() < 0.4) glitchTimer = 0.3 + Math.random() * 0.4;
  // shockwave
  spawnShockwave(W/2 + mouse.x * 0.2, H/2 + mouse.y * 0.2);
}

// ── MOUSE ──
const mouse = { x: 0, y: 0, down: false };
window.addEventListener('mousemove', e => {
  mouse.x = e.clientX - W/2;
  mouse.y = e.clientY - H/2;
});
window.addEventListener('mousedown', () => mouse.down = true);
window.addEventListener('mouseup',   () => mouse.down = false);

// ── CONTROLS ──
let gravityMul = 0.4;
let trailAlpha = 8;
let forceMul = 80;
let targetCount = 6000;

function bindSlider(id, valId, cb) {
  const sl = document.getElementById(id);
  const vl = document.getElementById(valId);
  sl.addEventListener('input', () => cb(+sl.value, vl));
}
bindSlider('sl-gravity', 'val-gravity', (v, el) => { gravityMul = v/100; el.textContent = v; });
bindSlider('sl-trail',   'val-trail',   (v, el) => { trailAlpha = v; el.textContent = v; });
bindSlider('sl-force',   'val-force',   (v, el) => { forceMul = v; el.textContent = v; });
bindSlider('sl-count',   'val-count',   (v, el) => {
  targetCount = v;
  el.textContent = v >= 1000 ? (v/1000).toFixed(v%1000===0?0:1)+'k' : v;
  initParticles();
});

// ── PARTICLES ──
const MAX = 16000;
const px = new Float32Array(MAX);
const py = new Float32Array(MAX);
const pvx = new Float32Array(MAX);
const pvy = new Float32Array(MAX);
const pmass = new Float32Array(MAX);
const plife = new Float32Array(MAX);
const phue = new Float32Array(MAX);

let pCount = 0;
const shockwaves = [];

function initParticles() {
  pCount = Math.min(targetCount, MAX);
  for (let i = 0; i < pCount; i++) {
    resetParticle(i, true);
  }
}

function resetParticle(i, init) {
  const angle = Math.random() * Math.PI * 2;
  const r = init ? Math.random() * Math.min(W, H) * 0.45 : Math.random() * 10;
  px[i] = W/2 + Math.cos(angle) * r;
  py[i] = H/2 + Math.sin(angle) * r;
  pvx[i] = (Math.random() - 0.5) * 1.5;
  pvy[i] = (Math.random() - 0.5) * 1.5;
  pmass[i] = 0.5 + Math.random() * 1.5;
  plife[i] = 0.5 + Math.random() * 0.5;
  // Cyberpunk palette: snap hue to one of 5 neon colors
  const slot = Math.floor(Math.random() * CYBER_PALETTE.length);
  phue[i] = slot * (360 / CYBER_PALETTE.length);
  // 60% dots, 25% diamonds, 15% sparks
  const r2 = Math.random();
  ptype[i] = r2 < 0.60 ? 0 : r2 < 0.85 ? 1 : 3;
}

function spawnShockwave(x, y) {
  shockwaves.push({ x, y, r: 0, maxR: Math.min(W, H) * 0.6, strength: bass * forceMul * 2 });
}

// ── CYBERPUNK COLOR PALETTE ──
// Locked to cyan / magenta / yellow / red — no rainbow spray
const CYBER_PALETTE = [
  { h: 185, label: 'cyan' },
  { h: 300, label: 'magenta' },
  { h: 55,  label: 'yellow' },
  { h: 0,   label: 'red' },
  { h: 140, label: 'green' },
];
const ptype = new Uint8Array(MAX); // 0=dot+cross, 1=diamond, 2=streak, 3=spark

function particleHue(i) {
  const slot = CYBER_PALETTE[Math.floor(phue[i] / (360 / CYBER_PALETTE.length))];
  return slot.h;
}

// Draw a diamond shape
function drawDiamond(x, y, r) {
  ctx.beginPath();
  ctx.moveTo(x,     y - r);
  ctx.lineTo(x + r, y    );
  ctx.lineTo(x,     y + r);
  ctx.lineTo(x - r, y    );
  ctx.closePath();
}

// Draw a cross/plus shape
function drawCross(x, y, r) {
  const t = r * 0.28;
  ctx.beginPath();
  ctx.moveTo(x - t, y - r); ctx.lineTo(x + t, y - r);
  ctx.lineTo(x + t, y - t); ctx.lineTo(x + r, y - t);
  ctx.lineTo(x + r, y + t); ctx.lineTo(x + t, y + t);
  ctx.lineTo(x + t, y + r); ctx.lineTo(x - t, y + r);
  ctx.lineTo(x - t, y + t); ctx.lineTo(x - r, y + t);
  ctx.lineTo(x - r, y - t); ctx.lineTo(x - t, y - t);
  ctx.closePath();
}

// Chromatic aberration offset (beats)
let chromaOffset = 0;
let glitchTimer = 0;

// ── RENDER LOOP ──
let frame = 0;
let lastTime = 0;

function loop(ts) {
  requestAnimationFrame(loop);
  const dt = Math.min((ts - lastTime) / 16.67, 3);
  lastTime = ts;
  frame++;

  analyzeAudio();

  const energy = vol;
  const bassFactor = bass * gravityMul * forceMul;
  const midFactor  = mids * 0.5;
  const highFactor = highs * 2;

  // ── TRAIL FADE — deep black with slight cyan tint ──
  ctx.fillStyle = `rgba(1,3,8,${0.055 + (trailAlpha/20) * 0.13})`;
  ctx.fillRect(0, 0, W, H);

  // ── SCANLINE GRID OVERLAY ──
  if (frame % 3 === 0) { // draw every 3 frames for perf
    ctx.save();
    ctx.strokeStyle = `rgba(0,255,220,${0.018 + energy * 0.022})`;
    ctx.lineWidth = 0.5;
    const gridSpacing = 48;
    for (let gx2 = 0; gx2 < W; gx2 += gridSpacing) {
      ctx.beginPath(); ctx.moveTo(gx2, 0); ctx.lineTo(gx2, H); ctx.stroke();
    }
    for (let gy2 = 0; gy2 < H; gy2 += gridSpacing) {
      ctx.beginPath(); ctx.moveTo(0, gy2); ctx.lineTo(W, gy2); ctx.stroke();
    }
    ctx.restore();
  }

  // ── HORIZONTAL SCANLINES (CRT effect) ──
  if (frame % 60 === 0 || glitchTimer > 0) {
    ctx.save();
    ctx.fillStyle = `rgba(0,0,0,${0.04})`;
    for (let sl = 0; sl < H; sl += 4) {
      ctx.fillRect(0, sl, W, 1);
    }
    ctx.restore();
  }

  // ── GRAVITY WELL: cursor ──
  const gx = W/2 + mouse.x;
  const gy = H/2 + mouse.y;
  const centerPull = mouse.down ? 3 : 1;

  // ── SHOCKWAVES — hexagonal cyber rings ──
  for (let s = shockwaves.length - 1; s >= 0; s--) {
    const sw = shockwaves[s];
    sw.r += 10 * dt;
    if (sw.r > sw.maxR) { shockwaves.splice(s, 1); continue; }
    const prog = sw.r / sw.maxR;
    const alpha = (1 - prog) * 0.7;

    // Outer ring cyan
    ctx.beginPath();
    ctx.arc(sw.x, sw.y, sw.r, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(0,255,220,${alpha * 0.8})`;
    ctx.lineWidth = 3 * (1 - prog);
    ctx.stroke();

    // Inner ring magenta (offset)
    if (sw.r > 10) {
      ctx.beginPath();
      ctx.arc(sw.x, sw.y, sw.r * 0.75, 0, Math.PI*2);
      ctx.strokeStyle = `rgba(255,0,200,${alpha * 0.4})`;
      ctx.lineWidth = 1.5 * (1 - prog);
      ctx.stroke();
    }

    // Radial spokes
    ctx.save();
    ctx.translate(sw.x, sw.y);
    ctx.strokeStyle = `rgba(0,255,220,${alpha * 0.3})`;
    ctx.lineWidth = 1;
    for (let sp = 0; sp < 8; sp++) {
      const a = (sp / 8) * Math.PI * 2 + frame * 0.02;
      ctx.beginPath();
      ctx.moveTo(Math.cos(a) * sw.r * 0.3, Math.sin(a) * sw.r * 0.3);
      ctx.lineTo(Math.cos(a) * sw.r, Math.sin(a) * sw.r);
      ctx.stroke();
    }
    ctx.restore();
  }

  // ── UPDATE + DRAW PARTICLES ──
  ctx.save();

  for (let i = 0; i < pCount; i++) {
    const cx = px[i] - W/2;
    const cy = py[i] - H/2;
    const distCenter = Math.sqrt(cx*cx + cy*cy) + 0.001;

    // Centre gravity
    const gravForce = (bassFactor * 0.12 + 0.3) * gravityMul;
    let ax = -cx / distCenter * gravForce / pmass[i];
    let ay = -cy / distCenter * gravForce / pmass[i];

    // Mouse gravity / repulsion
    const mx = px[i] - gx;
    const my = py[i] - gy;
    const distM = Math.sqrt(mx*mx + my*my) + 1;
    if (distM < 200) {
      const mForce = mouse.down ? -6 : 2;
      ax += mx / distM * mForce * energy / pmass[i];
      ay += my / distM * mForce * energy / pmass[i];
    }

    // Mids: rotational torque
    ax += (-cy / distCenter) * midFactor * 0.04;
    ay +=  (cx / distCenter) * midFactor * 0.04;

    // Highs: jitter
    if (highs > 0.1) {
      ax += (Math.random() - 0.5) * highs * highFactor * 0.3;
      ay += (Math.random() - 0.5) * highs * highFactor * 0.3;
    }

    // Shockwave forces
    for (const sw of shockwaves) {
      const sx = px[i] - sw.x;
      const sy = py[i] - sw.y;
      const sd = Math.sqrt(sx*sx + sy*sy) + 1;
      const ring = Math.abs(sd - sw.r);
      if (ring < 40) {
        const f = (40 - ring) / 40 * sw.strength * 0.02;
        ax += sx / sd * f / pmass[i];
        ay += sy / sd * f / pmass[i];
      }
    }

    // Integrate
    pvx[i] += ax * dt;
    pvy[i] += ay * dt;

    // Damping
    pvx[i] *= 0.992;
    pvy[i] *= 0.992;

    // Speed limit
    let speed = Math.sqrt(pvx[i]*pvx[i] + pvy[i]*pvy[i]);
    const maxSpeed = 6 + energy * 8;
    if (speed > maxSpeed) {
      pvx[i] = pvx[i] / speed * maxSpeed;
      pvy[i] = pvy[i] / speed * maxSpeed;
      speed = maxSpeed;
    }

    px[i] += pvx[i] * dt;
    py[i] += pvy[i] * dt;

    // Wrap
    if (px[i] < -20) px[i] = W + 20;
    if (px[i] > W+20) px[i] = -20;
    if (py[i] < -20) py[i] = H + 20;
    if (py[i] > H+20) py[i] = -20;

    // ── DRAW PARTICLE — CYBERPUNK STYLE ──
    const speedRatio = Math.min(speed / (maxSpeed * 0.8), 1);
    const sz = (0.6 + pmass[i] * 0.5) * (1 + energy * 1.8);
    const hue = particleHue(i);
    // Brightness spikes with energy
    const lum = 55 + energy * 35 + speedRatio * 20;
    const sat = 90 + energy * 10;
    const alpha = 0.55 + energy * 0.45;

    // Chromatic aberration: offset red/blue channels slightly on beats
    const ca = chromaOffset * (pmass[i] > 1 ? 1 : 0.4);

    if (ptype[i] === 1) {
      // ── DIAMOND ──
      // Cyan ghost offset
      ctx.save();
      ctx.translate(px[i] + ca, py[i]);
      drawDiamond(0, 0, sz * 1.3);
      ctx.fillStyle = `rgba(0,255,220,${alpha * 0.25})`;
      ctx.fill();
      // Magenta ghost offset
      ctx.translate(-ca*2, 0);
      drawDiamond(0, 0, sz * 1.3);
      ctx.fillStyle = `rgba(255,0,200,${alpha * 0.25})`;
      ctx.fill();
      ctx.restore();

      // Core diamond
      drawDiamond(px[i], py[i], sz * 1.1);
      ctx.fillStyle = `hsla(${hue},${sat}%,${lum}%,${alpha})`;
      ctx.fill();

      // Bright center point
      ctx.beginPath();
      ctx.arc(px[i], py[i], sz * 0.35, 0, Math.PI*2);
      ctx.fillStyle = `hsla(${hue},100%,95%,${alpha})`;
      ctx.fill();

      // Outer glow
      ctx.save();
      ctx.shadowColor = `hsla(${hue},100%,70%,1)`;
      ctx.shadowBlur = 8 + energy * 12;
      drawDiamond(px[i], py[i], sz * 1.1);
      ctx.fillStyle = `hsla(${hue},100%,${lum}%,${alpha * 0.4})`;
      ctx.fill();
      ctx.restore();

    } else if (ptype[i] === 3) {
      // ── SPARK — thin motion streak ──
      if (speed > 0.5) {
        const len = Math.min(speed * 3.5 + energy * 8, 28);
        const nx = -pvx[i] / speed;
        const ny = -pvy[i] / speed;
        const grad = ctx.createLinearGradient(
          px[i], py[i],
          px[i] + nx * len, py[i] + ny * len
        );
        grad.addColorStop(0, `hsla(${hue},100%,${lum}%,${alpha})`);
        grad.addColorStop(0.4, `hsla(${hue},100%,${lum}%,${alpha * 0.5})`);
        grad.addColorStop(1, `hsla(${hue},100%,${lum}%,0)`);
        ctx.beginPath();
        ctx.moveTo(px[i], py[i]);
        ctx.lineTo(px[i] + nx * len, py[i] + ny * len);
        ctx.strokeStyle = grad;
        ctx.lineWidth = sz * 0.8;
        ctx.lineCap = 'round';
        ctx.stroke();

        // Head dot
        ctx.beginPath();
        ctx.arc(px[i], py[i], sz * 0.7, 0, Math.PI*2);
        ctx.fillStyle = `hsla(${hue},100%,92%,${alpha})`;
        ctx.fill();
      }

    } else {
      // ── DOT + CROSS HAIR ──
      // Crosshair lines
      const cLen = sz * 2.2 + speedRatio * 3;
      ctx.save();
      ctx.strokeStyle = `hsla(${hue},100%,${lum}%,${alpha * 0.5})`;
      ctx.lineWidth = 0.6;
      ctx.beginPath();
      ctx.moveTo(px[i] - cLen, py[i]); ctx.lineTo(px[i] + cLen, py[i]);
      ctx.moveTo(px[i], py[i] - cLen); ctx.lineTo(px[i], py[i] + cLen);
      ctx.stroke();
      ctx.restore();

      // Chromatic offset dots
      if (ca > 0.5) {
        ctx.beginPath();
        ctx.arc(px[i] + ca, py[i], sz * 0.8, 0, Math.PI*2);
        ctx.fillStyle = `rgba(0,255,255,${alpha * 0.3})`;
        ctx.fill();
        ctx.beginPath();
        ctx.arc(px[i] - ca, py[i], sz * 0.8, 0, Math.PI*2);
        ctx.fillStyle = `rgba(255,0,200,${alpha * 0.3})`;
        ctx.fill();
      }

      // Core circle
      ctx.beginPath();
      ctx.arc(px[i], py[i], sz, 0, Math.PI*2);
      ctx.fillStyle = `hsla(${hue},${sat}%,${lum}%,${alpha})`;
      ctx.fill();

      // Hard white core
      ctx.beginPath();
      ctx.arc(px[i], py[i], sz * 0.4, 0, Math.PI*2);
      ctx.fillStyle = `rgba(255,255,255,${alpha * 0.8})`;
      ctx.fill();

      // Soft glow halo
      if (energy > 0.15 || speedRatio > 0.4) {
        const gr = ctx.createRadialGradient(px[i], py[i], sz*0.5, px[i], py[i], sz*3.5);
        gr.addColorStop(0, `hsla(${hue},100%,70%,${(energy * 0.18 + speedRatio * 0.1)})`);
        gr.addColorStop(1, `hsla(${hue},100%,70%,0)`);
        ctx.beginPath();
        ctx.arc(px[i], py[i], sz * 3.5, 0, Math.PI*2);
        ctx.fillStyle = gr;
        ctx.fill();
      }
    }

  ctx.restore();

  // ── CYBERPUNK POST-FX ──

  // Central core bloom — cyan/magenta split
  if (energy > 0.15) {
    // Cyan bloom
    const g1 = ctx.createRadialGradient(W/2 - chromaOffset, H/2, 0, W/2 - chromaOffset, H/2, 180 + bass * 220);
    g1.addColorStop(0, `rgba(0,255,220,${energy * 0.06})`);
    g1.addColorStop(1, 'transparent');
    ctx.fillStyle = g1;
    ctx.fillRect(0, 0, W, H);

    // Magenta bloom (offset)
    const g2 = ctx.createRadialGradient(W/2 + chromaOffset, H/2, 0, W/2 + chromaOffset, H/2, 140 + bass * 180);
    g2.addColorStop(0, `rgba(255,0,200,${energy * 0.04})`);
    g2.addColorStop(1, 'transparent');
    ctx.fillStyle = g2;
    ctx.fillRect(0, 0, W, H);
  }

  // Glitch horizontal bar
  if (glitchTimer > 0) {
    glitchTimer -= dt;
    const numBars = Math.floor(2 + Math.random() * 3);
    for (let b = 0; b < numBars; b++) {
      const gy3 = Math.random() * H;
      const gh = 1 + Math.random() * 4;
      ctx.fillStyle = `rgba(0,255,220,${0.06 + Math.random() * 0.08})`;
      ctx.fillRect(0, gy3, W, gh);
      // offset copy
      const offX = (Math.random() - 0.5) * 30;
      ctx.drawImage(canvas, offX, gy3 - 1, W, gh + 2, offX + (Math.random()-0.5)*8, gy3 - 1, W, gh + 2);
    }
  }

  // Decay chroma offset
  chromaOffset *= 0.85;
  if (chromaOffset < 0.1) chromaOffset = 0;

  // ── FREQ BAR VISUALIZER ──
  drawFreqBars();

  // ── NO AUDIO IDLE ANIMATION ──
  if (!audioActive) idleAnimation();
}

function idleAnimation() {
  // gentle pulse when no audio
  const t = Date.now() / 1000;
  bass  = 0.15 + Math.sin(t * 0.7) * 0.08;
  mids  = 0.10 + Math.sin(t * 1.3) * 0.06;
  highs = 0.05 + Math.sin(t * 2.1) * 0.04;
  vol   = (bass + mids + highs) / 3;
}

function drawFreqBars() {
  if (!analyser) return;
  fctx.clearRect(0, 0, W, 60);
  const bars = 128;
  const bw = W / bars;
  for (let i = 0; i < bars; i++) {
    const v = dataArray[i] / 255;
    const h = v * 55;
    // Alternate cyan and magenta
    const hue = i % 3 === 0 ? 185 : i % 3 === 1 ? 300 : 55;
    const bright = 50 + v * 40;
    fctx.fillStyle = `hsla(${hue}, 100%, ${bright}%, ${0.35 + v * 0.65})`;
    fctx.fillRect(i * bw, 60 - h, bw - 1, h);
    // Top cap
    if (h > 2) {
      fctx.fillStyle = `hsla(${hue}, 100%, 90%, ${v * 0.9})`;
      fctx.fillRect(i * bw, 60 - h - 1, bw - 1, 2);
    }
  }
}

// ── BUTTON HANDLERS ──
document.getElementById('btn-start').addEventListener('click', () => {
  const ob = document.getElementById('onboard');
  ob.classList.add('hidden');
  setTimeout(() => ob.style.display = 'none', 800);
  initParticles();
  requestAnimationFrame(loop);
});

document.getElementById('btn-mic').addEventListener('click', async () => {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    setupAnalyser(stream);
    document.getElementById('status-text').textContent = 'Microphone';
    showTooltip('Microphone active');
  } catch(e) {
    showTooltip('Microphone access denied');
  }
});

document.getElementById('btn-system').addEventListener('click', async () => {
  try {
    const stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
    setupAnalyser(stream);
    document.getElementById('status-text').textContent = 'System Audio';
    showTooltip('System audio active — play any music!');
  } catch(e) {
    showTooltip('Screen share cancelled or not supported');
  }
});

// ── TOOLTIP ──
let tooltipTimer;
function showTooltip(msg) {
  const el = document.getElementById('tooltip');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(tooltipTimer);
  tooltipTimer = setTimeout(() => el.classList.remove('show'), 3000);
}

// ── KEYBOARD SHORTCUTS ──
window.addEventListener('keydown', e => {
  if (e.key === ' ') spawnShockwave(W/2, H/2);
  if (e.key === 'r') initParticles();
});

// ── INIT ──
initParticles();
</script>
</body>
</html>
