<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARTICULA</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { width: 100%; height: 100%; background: #000; overflow: hidden; font-family: 'Space Mono', monospace; }
  canvas#gl { position: fixed; inset: 0; width: 100%; height: 100%; display: block; }

  /* ── ONBOARD ── */
  #onboard {
    position: fixed; inset: 0; z-index: 30;
    display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 28px;
    background: #000;
    transition: opacity 1.4s cubic-bezier(.4,0,.2,1);
  }
  #onboard.out { opacity: 0; pointer-events: none; }
  #preview-wrap {
    position: relative;
    width: 180px; height: 180px;
    border-radius: 50%;
    overflow: hidden;
    box-shadow: 0 0 60px rgba(255,255,255,0.08), 0 0 120px rgba(150,100,255,0.15);
  }
  canvas#preview { width: 180px; height: 180px; }
  #ob-title {
    font-size: clamp(28px, 5vw, 52px); font-weight: 700;
    letter-spacing: .4em; text-transform: uppercase; color: #fff;
    text-shadow: 0 0 40px rgba(200,150,255,.5);
  }
  #ob-sub {
    font-size: 10px; letter-spacing: .25em; color: rgba(255,255,255,.28);
    text-transform: uppercase; text-align: center; line-height: 2.2;
  }
  #btn-enter {
    background: transparent; border: 1px solid rgba(255,255,255,.2); border-radius: 2px;
    padding: 14px 54px; font-family: 'Space Mono', monospace;
    font-size: 10px; letter-spacing: .32em; text-transform: uppercase;
    color: rgba(255,255,255,.55); cursor: pointer;
    position: relative; overflow: hidden; transition: all .3s;
  }
  #btn-enter::after {
    content: ''; position: absolute; inset: 0;
    background: linear-gradient(90deg, transparent, rgba(255,255,255,.07), transparent);
    transform: translateX(-100%); animation: shine 2.5s linear infinite;
  }
  @keyframes shine { to { transform: translateX(100%); } }
  #btn-enter:hover { border-color: rgba(255,255,255,.55); color: #fff; box-shadow: 0 0 30px rgba(255,255,255,.08); }

  /* ── UI LAYER ── */
  #ui {
    position: fixed; inset: 0; z-index: 10; pointer-events: none;
  }

  /* brand */
  #brand { position: absolute; top: 26px; left: 32px; }
  #brand h1 { font-size: 10px; letter-spacing: .42em; text-transform: uppercase; color: rgba(255,255,255,.35); font-weight: 700; }
  #brand p  { font-size: 8px; letter-spacing: .22em; text-transform: uppercase; color: rgba(255,255,255,.14); margin-top: 5px; }

  /* status */
  #stat { position: absolute; top: 26px; right: 32px; display: flex; align-items: center; gap: 7px; font-size: 8px; letter-spacing: .22em; color: rgba(255,255,255,.22); text-transform: uppercase; }
  #dot { width: 5px; height: 5px; border-radius: 50%; background: #222; transition: all .4s; }
  #dot.live { background: #fff; box-shadow: 0 0 8px #fff; animation: pulse 2s ease-in-out infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.35} }

  /* controls — minimal floating panel */
  #panel {
    position: absolute; bottom: 30px; left: 32px;
    display: flex; flex-direction: column; gap: 9px;
    pointer-events: all;
    background: rgba(0,0,0,.45);
    border: 1px solid rgba(255,255,255,.07);
    border-radius: 4px;
    padding: 16px 20px;
    backdrop-filter: blur(12px);
  }
  .row { display: flex; align-items: center; gap: 12px; }
  .lbl { font-size: 7px; letter-spacing: .22em; color: rgba(255,255,255,.22); text-transform: uppercase; width: 44px; }
  input[type=range] {
    -webkit-appearance: none; appearance: none; width: 90px; height: 1px;
    background: rgba(255,255,255,.12); border-radius: 1px; outline: none; cursor: pointer;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 8px; height: 8px; border-radius: 50%;
    background: rgba(255,255,255,.75); cursor: grab; transition: transform .1s;
  }
  input[type=range]:active::-webkit-slider-thumb { transform: scale(1.6); }
  .val { font-size: 8px; color: rgba(255,255,255,.35); min-width: 22px; }

  /* buttons */
  #btns { position: absolute; bottom: 30px; right: 32px; display: flex; gap: 8px; pointer-events: all; }
  .btn {
    background: rgba(0,0,0,.5); border: 1px solid rgba(255,255,255,.1); border-radius: 2px;
    padding: 9px 18px; font-family: 'Space Mono', monospace; font-size: 8px;
    letter-spacing: .2em; text-transform: uppercase; color: rgba(255,255,255,.3);
    cursor: pointer; transition: all .2s; backdrop-filter: blur(8px);
  }
  .btn:hover { border-color: rgba(255,255,255,.35); color: rgba(255,255,255,.8); }
  .btn.hi { border-color: rgba(255,255,255,.2); color: rgba(255,255,255,.55); }

  /* tip */
  #tip {
    position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
    font-size: 8px; letter-spacing: .22em; color: rgba(255,255,255,.2);
    text-transform: uppercase; pointer-events: none; opacity: 0; transition: opacity .8s;
  }
  #tip.show { opacity: 1; }

  /* symmetry ring indicator */
  #sym-ring {
    position: absolute; top: 50%; right: 32px; transform: translateY(-50%);
    font-size: 7px; letter-spacing: .15em; color: rgba(255,255,255,.15);
    text-transform: uppercase; text-align: right; pointer-events: none;
    writing-mode: vertical-rl;
  }
</style>
</head>
<body>

<canvas id="gl"></canvas>

<!-- ONBOARD -->
<div id="onboard">
  <div id="preview-wrap"><canvas id="preview" width="360" height="360"></canvas></div>
  <div id="ob-title">Kaleidosync</div>
  <div id="ob-sub">WebGL kaleidoscope · audio reactive<br>mic · system audio · any source</div>
  <button id="btn-enter">Enter</button>
</div>

<!-- UI -->
<div id="ui">
  <div id="brand"><h1>Kaleidosync</h1><p>WebGL Audio Visualizer</p></div>
  <div id="stat"><div id="dot"></div><span id="stat-txt">Idle</span></div>
  <div id="panel">
    <div class="row"><span class="lbl">Slices</span><input type="range" id="sl-sym"  min="2"  max="24"  step="1"   value="8" ><span class="val" id="v-sym">8</span></div>
    <div class="row"><span class="lbl">Speed</span> <input type="range" id="sl-spd"  min="0"  max="100" step="1"   value="35"><span class="val" id="v-spd">35</span></div>
    <div class="row"><span class="lbl">Zoom</span>  <input type="range" id="sl-zoom" min="5"  max="40"  step="0.5" value="12"><span class="val" id="v-zoom">12</span></div>
    <div class="row"><span class="lbl">Hue</span>   <input type="range" id="sl-hue"  min="0"  max="360" step="1"   value="0" ><span class="val" id="v-hue">0</span></div>
    <div class="row"><span class="lbl">Glow</span>  <input type="range" id="sl-glow" min="0"  max="100" step="1"   value="60"><span class="val" id="v-glow">60</span></div>
    <div class="row"><span class="lbl">React</span> <input type="range" id="sl-react"min="0"  max="100" step="1"   value="70"><span class="val" id="v-react">70</span></div>
  </div>
  <div id="btns">
    <button class="btn"    id="btn-mic">Mic</button>
    <button class="btn hi" id="btn-sys">System Audio</button>
  </div>
  <div id="tip"></div>
  <div id="sym-ring" id="sym-ring">8×</div>
</div>

<!-- ════════════════════════════════════════════════════
     VERTEX SHADER
═══════════════════════════════════════════════════════ -->
<script id="vs" type="x-shader/x-vertex">
attribute vec2 a_pos;
void main() { gl_Position = vec4(a_pos, 0.0, 1.0); }
</script>

<!-- ════════════════════════════════════════════════════
     FRAGMENT SHADER  — the kaleidoscope lives here
═══════════════════════════════════════════════════════ -->
<script id="fs" type="x-shader/x-fragment">
precision highp float;

uniform vec2  u_res;
uniform float u_time;
uniform float u_bass;
uniform float u_mids;
uniform float u_highs;
uniform float u_vol;
uniform float u_beat;       // 0-1, decays after beat
uniform float u_sym;        // number of slices
uniform float u_speed;
uniform float u_zoom;
uniform float u_hue;
uniform float u_glow;
uniform float u_react;
uniform float u_rot;        // global rotation driven by bass

// ── HSV → RGB ──────────────────────────────────────────
vec3 hsv2rgb(vec3 c) {
  vec4 K = vec4(1.0, 2.0/3.0, 1.0/3.0, 3.0);
  vec3 p = abs(fract(c.xxx + K.xyz) * 6.0 - K.www);
  return c.z * mix(K.xxx, clamp(p - K.xxx, 0.0, 1.0), c.y);
}

// ── Smooth HSB color ramp ──────────────────────────────
vec3 palette(float t, float hShift) {
  t = fract(t + hShift / 360.0);
  return hsv2rgb(vec3(t, 0.82 + u_mids * 0.18, 0.72 + u_vol * 0.28));
}

// ── 2D rotation ───────────────────────────────────────
vec2 rot2d(vec2 p, float a) {
  float s = sin(a), c = cos(a);
  return vec2(c*p.x - s*p.y, s*p.x + c*p.y);
}

// ── Kaleidoscope fold ─────────────────────────────────
// Mirrors uv into one wedge slice, returns (folded uv, mirror flag)
vec2 kscope(vec2 p, float n) {
  float angle = 3.14159265 / n;
  float a = atan(p.y, p.x);
  // quantise to wedge
  a = mod(a, 2.0 * angle);
  if (a > angle) a = 2.0 * angle - a;   // mirror
  float r = length(p);
  return vec2(cos(a) * r, sin(a) * r);
}

// ── Layered FBM-like noise ────────────────────────────
float hash(vec2 p) {
  return fract(sin(dot(p, vec2(127.1, 311.7))) * 43758.5453);
}
float noise(vec2 p) {
  vec2 i = floor(p); vec2 f = fract(p);
  f = f*f*(3.0-2.0*f);
  return mix(
    mix(hash(i), hash(i+vec2(1,0)), f.x),
    mix(hash(i+vec2(0,1)), hash(i+vec2(1,1)), f.x), f.y);
}
float fbm(vec2 p) {
  float v = 0.0, a = 0.5;
  for (int i = 0; i < 6; i++) {
    v += a * noise(p);
    p  = p * 2.1 + vec2(1.7, 9.2);
    a *= 0.5;
  }
  return v;
}

// ── SDF: soft circle ring ─────────────────────────────
float ring(vec2 p, float r, float w) {
  return 1.0 - smoothstep(0.0, w, abs(length(p) - r));
}

// ── Main ──────────────────────────────────────────────
void main() {
  vec2 uv = (gl_FragCoord.xy - u_res * 0.5) / min(u_res.x, u_res.y);

  float time    = u_time * u_speed * 0.35;
  float react   = u_react;
  float beatB   = u_beat;
  float bass    = u_bass;
  float mids    = u_mids;
  float highs   = u_highs;
  float vol     = u_vol;

  // ── Global rotation driven by beat + bass ─────────
  uv = rot2d(uv, u_rot + beatB * 0.15);

  // ── Zoom + audio breathing ────────────────────────
  float zoom = u_zoom * 0.1 * (1.0 + bass * react * 0.6 + beatB * react * 0.18);
  uv *= zoom;

  // ── Kaleidoscope fold ─────────────────────────────
  float symN = max(2.0, u_sym);
  vec2  kuv  = kscope(uv, symN);

  // ── Time-scrolling offset into the folded space ───
  vec2 scroll = vec2(
    time * 0.22 + bass  * react * 0.4,
    time * 0.17 + mids  * react * 0.3
  );

  // Working coordinates
  vec2 p = kuv + scroll;

  // ── Layer 1: FBM background texture ───────────────
  float f1 = fbm(p * 1.8);
  float f2 = fbm(p * 3.2 + vec2(f1 * 2.0 + time * 0.3, time * 0.2));
  float f3 = fbm(p * 0.9 + vec2(f2 * 1.5, f1 * 1.2) + time * 0.12);

  // Domain-warp the FBM with mids
  vec2 warp = vec2(
    fbm(p + vec2(1.7, 9.2) + time * 0.1  + mids * react * 0.5),
    fbm(p + vec2(8.3, 2.8) + time * 0.08 + highs * react * 0.4)
  );
  float warped = fbm(p + warp * (1.4 + bass * react * 1.2));

  // ── Color from layered fbm ─────────────────────────
  float hueT  = warped * 1.4 + f2 * 0.6 + time * 0.08;
  vec3  col   = palette(hueT, u_hue);
  col = mix(col, palette(hueT + 0.28, u_hue + 60.0), f1 * 0.6);
  col = mix(col, palette(hueT + 0.55, u_hue - 40.0), f3 * 0.35);

  // ── Layer 2: Concentric audio-reactive rings ───────
  float dist   = length(kuv);
  float rings  = 0.0;
  int   nRings = 12;
  for (int ri = 0; ri < 12; ri++) {
    float rf  = float(ri) / 12.0;
    float rad = 0.08 + rf * 1.4;
    // Modulate radius with bass / mids per ring
    float amp = (ri < 4 ? bass : (ri < 8 ? mids : highs)) * react;
    rad += amp * 0.18 * sin(float(ri) * 2.1 + time * 2.0 + beatB * 3.14);
    float w = 0.006 + amp * 0.018;
    rings += ring(vec2(dist - rad, 0.0), 0.0, w)
             * (0.5 + amp * 1.5)
             * (0.7 + 0.3 * sin(float(ri) * 1.3 + time));
  }
  float rHue = dist * 0.6 + time * 0.12 + warped * 0.4;
  vec3  rCol = palette(rHue, u_hue + 30.0);
  col = mix(col, rCol, clamp(rings * (0.6 + u_glow * 0.006), 0.0, 1.0));

  // ── Layer 3: Radial spoke lines ────────────────────
  float angle   = atan(kuv.y, kuv.x);
  float spokes  = abs(sin(angle * symN * 0.5 + time * 0.4));
  spokes  = pow(spokes, 18.0 - bass * react * 10.0);
  float sHue    = angle * 0.5 + time * 0.05 + warped;
  col    += palette(sHue, u_hue + 90.0) * spokes * (0.3 + bass * react * 0.7) * (0.5 + u_glow * 0.005);

  // ── Layer 4: Bright center bloom ──────────────────
  float centR   = 0.05 + bass * react * 0.12 + beatB * 0.06;
  float center  = smoothstep(centR, 0.0, dist);
  col    += palette(time * 0.15, u_hue) * center * (3.0 + u_glow * 0.04 + beatB * 3.0);

  // ── Layer 5: Beat flash ────────────────────────────
  float flash   = beatB * 0.18 * react;
  col    += palette(time * 0.3 + 0.5, u_hue + 180.0) * flash;

  // ── Layer 6: Outer vignette ────────────────────────
  float vign    = 1.0 - smoothstep(0.5 / zoom, 1.1 / zoom, dist / zoom);
  col    *= vign * (0.9 + 0.1 * vol);

  // ── Gamma + tonemap ───────────────────────────────
  col    = pow(max(col, vec3(0.0)), vec3(0.88));
  // Reinhard tone map
  col    = col / (col + vec3(0.9));
  col    = clamp(col * (1.0 + beatB * 0.12), 0.0, 1.0);

  gl_FragColor = vec4(col, 1.0);
}
</script>

<script>
"use strict";

// ══════════════════════════════════════════════════════
//  WebGL setup
// ══════════════════════════════════════════════════════
const glCanvas = document.getElementById('gl');
const gl = glCanvas.getContext('webgl', { antialias: false, alpha: false });
if (!gl) { document.body.innerHTML = '<p style="color:#fff;padding:40px">WebGL not supported</p>'; }

function compileShader(type, src) {
  const s = gl.createShader(type);
  gl.shaderSource(s, src);
  gl.compileShader(s);
  if (!gl.getShaderParameter(s, gl.COMPILE_STATUS))
    console.error('Shader error:', gl.getShaderInfoLog(s));
  return s;
}

const prog = gl.createProgram();
gl.attachShader(prog, compileShader(gl.VERTEX_SHADER,   document.getElementById('vs').textContent));
gl.attachShader(prog, compileShader(gl.FRAGMENT_SHADER, document.getElementById('fs').textContent));
gl.linkProgram(prog);
if (!gl.getProgramParameter(prog, gl.LINK_STATUS))
  console.error('Link error:', gl.getProgramInfoLog(prog));
gl.useProgram(prog);

// Full-screen quad
const buf = gl.createBuffer();
gl.bindBuffer(gl.ARRAY_BUFFER, buf);
gl.bufferData(gl.ARRAY_BUFFER, new Float32Array([-1,-1, 1,-1, -1,1, 1,1]), gl.STATIC_DRAW);
const posLoc = gl.getAttribLocation(prog, 'a_pos');
gl.enableVertexAttribArray(posLoc);
gl.vertexAttribPointer(posLoc, 2, gl.FLOAT, false, 0, 0);

// Uniform locations
const U = {};
['u_res','u_time','u_bass','u_mids','u_highs','u_vol','u_beat',
 'u_sym','u_speed','u_zoom','u_hue','u_glow','u_react','u_rot'
].forEach(n => U[n] = gl.getUniformLocation(prog, n));

function setF(name, v) { gl.uniform1f(U[name], v); }

let W = 0, H = 0;
function resize() {
  W = glCanvas.width  = window.innerWidth;
  H = glCanvas.height = window.innerHeight;
  gl.viewport(0, 0, W, H);
  gl.uniform2f(U.u_res, W, H);
}
resize();
window.addEventListener('resize', resize);

// ══════════════════════════════════════════════════════
//  Audio
// ══════════════════════════════════════════════════════
let audioCtx, analyser, fftData;
let audioActive = false;
let bass = 0, mids = 0, highs = 0, vol = 0;
let beatHistory = [], lastBeat = 0, beatDecay = 0;
let smoothBass = 0, smoothVol = 0;

function avgSlice(arr, s, e) {
  let t = 0; for (let i = s; i < e; i++) t += arr[i];
  return t / ((e - s) * 255);
}

function setupAudio(stream) {
  if (audioCtx) audioCtx.close();
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  analyser  = audioCtx.createAnalyser();
  analyser.fftSize = 2048;
  analyser.smoothingTimeConstant = 0.8;
  fftData = new Uint8Array(analyser.frequencyBinCount);
  audioCtx.createMediaStreamSource(stream).connect(analyser);
  audioActive = true;
  document.getElementById('dot').classList.add('live');
}

function readAudio() {
  if (!analyser) return;
  analyser.getByteFrequencyData(fftData);
  bass  = avgSlice(fftData,   0,  10);
  mids  = avgSlice(fftData,  10, 100);
  highs = avgSlice(fftData, 100, 250);
  vol   = avgSlice(fftData,   0, 250);
  // Beat
  beatHistory.push(bass);
  if (beatHistory.length > 60) beatHistory.shift();
  const avg = beatHistory.reduce((a,b)=>a+b,0) / beatHistory.length;
  if (bass > avg * 1.5 && Date.now() - lastBeat > 180) {
    lastBeat = Date.now(); beatDecay = 1.0;
  }
}

function idlePulse() {
  const t = Date.now() / 1000;
  bass  = 0.18 + Math.sin(t * 0.55) * 0.1;
  mids  = 0.12 + Math.sin(t * 1.1)  * 0.07;
  highs = 0.06 + Math.sin(t * 2.4)  * 0.04;
  vol   = (bass + mids + highs) / 3;
}

// ══════════════════════════════════════════════════════
//  Controls
// ══════════════════════════════════════════════════════
let cSym   = 8,   cSymTarget = 8;
let cSpeed = 0.35;
let cZoom  = 12;
let cHue   = 0;
let cGlow  = 60;
let cReact = 0.7;
let globalRot = 0;

function bindSlider(id, valId, fn) {
  const sl = document.getElementById(id);
  const vl = document.getElementById(valId);
  sl.addEventListener('input', () => { fn(+sl.value); vl.textContent = +sl.value % 1 === 0 ? sl.value : (+sl.value).toFixed(1); });
}
bindSlider('sl-sym',   'v-sym',   v => { cSymTarget = v; });
bindSlider('sl-spd',   'v-spd',   v => { cSpeed = v / 100; });
bindSlider('sl-zoom',  'v-zoom',  v => { cZoom  = v; });
bindSlider('sl-hue',   'v-hue',   v => { cHue   = v; });
bindSlider('sl-glow',  'v-glow',  v => { cGlow  = v; });
bindSlider('sl-react', 'v-react', v => { cReact = v / 100; });

window.addEventListener('keydown', e => {
  if (e.key === 'ArrowUp')   { cSymTarget = Math.min(24, Math.round(cSym)+1); document.getElementById('sl-sym').value = cSymTarget; document.getElementById('v-sym').textContent = cSymTarget; }
  if (e.key === 'ArrowDown') { cSymTarget = Math.max(2,  Math.round(cSym)-1); document.getElementById('sl-sym').value = cSymTarget; document.getElementById('v-sym').textContent = cSymTarget; }
  if (e.key === 'r' || e.key === 'R') globalRot = 0;
});

// ══════════════════════════════════════════════════════
//  Preview canvas (onboard)
// ══════════════════════════════════════════════════════
const prevC   = document.getElementById('preview');
const prevCtx = prevC.getContext('2d');
let   prevT   = 0;

function animatePreview() {
  prevT += 0.012;
  prevCtx.fillStyle = 'rgba(0,0,0,0.18)';
  prevCtx.fillRect(0, 0, 360, 360);
  prevCtx.save();
  prevCtx.translate(180, 180);
  const slices = 10;
  const wedge  = (Math.PI * 2) / slices;
  for (let s = 0; s < slices; s++) {
    prevCtx.save();
    prevCtx.rotate(s * wedge + prevT * 0.15);
    if (s % 2 === 1) prevCtx.scale(1, -1);
    for (let r = 10; r < 165; r += 9) {
      const pct  = r / 165;
      const h    = (prevT * 50 + pct * 220) % 360;
      const wave = Math.sin(prevT * 1.8 + r * 0.12) * 12 * pct;
      const wr   = r + wave;
      prevCtx.beginPath();
      prevCtx.arc(wr * 0.18, wr * 0.22, 2 + pct * 3, 0, Math.PI*2);
      prevCtx.fillStyle = `hsla(${h},85%,62%,${0.7 - pct*0.3})`;
      prevCtx.fill();
    }
    // glow line
    const h2 = (prevT * 60 + s * 36) % 360;
    prevCtx.beginPath();
    prevCtx.moveTo(0, 0);
    prevCtx.lineTo(Math.cos(prevT * 0.4 + s) * 140, Math.sin(prevT * 0.5 + s * 0.7) * 120);
    prevCtx.strokeStyle = `hsla(${h2},90%,65%,0.25)`;
    prevCtx.lineWidth = 1.5;
    prevCtx.stroke();
    prevCtx.restore();
  }
  prevCtx.restore();
  requestAnimationFrame(animatePreview);
}
animatePreview();

// ══════════════════════════════════════════════════════
//  Main render loop
// ══════════════════════════════════════════════════════
let running = false, startT = 0, lastTS = 0;

function loop(ts) {
  if (!running) return;
  requestAnimationFrame(loop);
  const dt = Math.min((ts - lastTS) / 16.67, 3);
  lastTS = ts;
  const elapsed = (ts - startT) / 1000;

  if (!audioActive) idlePulse();
  else readAudio();

  // Smooth values
  smoothBass = smoothBass + (bass - smoothBass) * 0.25;
  smoothVol  = smoothVol  + (vol  - smoothVol)  * 0.2;
  beatDecay  = Math.max(0, beatDecay - dt * 0.055);
  cSym       = cSym + (cSymTarget - cSym) * 0.04 * dt;
  globalRot += dt * (0.004 + smoothBass * cReact * 0.012) * (cSpeed / 0.35);

  // Update sym ring indicator
  document.getElementById('sym-ring').textContent = Math.round(cSym) + '×';

  // Set uniforms
  setF('u_time',  elapsed);
  setF('u_bass',  smoothBass);
  setF('u_mids',  mids);
  setF('u_highs', highs);
  setF('u_vol',   smoothVol);
  setF('u_beat',  beatDecay);
  setF('u_sym',   cSym);
  setF('u_speed', cSpeed);
  setF('u_zoom',  cZoom);
  setF('u_hue',   cHue);
  setF('u_glow',  cGlow);
  setF('u_react', cReact);
  setF('u_rot',   globalRot);

  gl.drawArrays(gl.TRIANGLE_STRIP, 0, 4);
}

// ══════════════════════════════════════════════════════
//  Buttons
// ══════════════════════════════════════════════════════
document.getElementById('btn-enter').addEventListener('click', () => {
  const ob = document.getElementById('onboard');
  ob.classList.add('out');
  setTimeout(() => ob.style.display='none', 1400);
  startT = performance.now();
  lastTS = startT;
  running = true;
  requestAnimationFrame(loop);
});

document.getElementById('btn-mic').addEventListener('click', async () => {
  try {
    setupAudio(await navigator.mediaDevices.getUserMedia({ audio: true }));
    document.getElementById('stat-txt').textContent = 'Mic';
    showTip('Microphone active');
  } catch(e) { showTip('Mic access denied'); }
});

document.getElementById('btn-sys').addEventListener('click', async () => {
  try {
    setupAudio(await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true }));
    document.getElementById('stat-txt').textContent = 'System';
    showTip('System audio active — play any music!');
  } catch(e) { showTip('Screen share cancelled'); }
});

let tipTimer;
function showTip(msg) {
  const el = document.getElementById('tip');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(tipTimer);
  tipTimer = setTimeout(() => el.classList.remove('show'), 3200);
}
</script>
