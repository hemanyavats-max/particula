<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>PARTICULA — Cyberpunk Audio Visualizer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Rajdhani:wght@300;400;600&family=Space+Mono:wght@400;700&display=swap');

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #010206;
    --ui-bg: rgba(2, 6, 16, 0.88);
    --border: rgba(0, 255, 220, 0.15);
    --cyan: #00ffdc;
    --magenta: #ff00c8;
    --text: rgba(180, 255, 245, 0.9);
    --text-dim: rgba(0, 200, 180, 0.45);
  }

  html, body { width:100%; height:100%; background:var(--bg); overflow:hidden; font-family:'Rajdhani',sans-serif; color:var(--text); cursor:crosshair; }
  canvas { position:fixed; inset:0; display:block; }
  #ui { position:fixed; inset:0; pointer-events:none; z-index:10; }

  #title-block { position:absolute; top:32px; left:40px; }
  #title-block h1 {
    font-family:'Space Mono',monospace; font-size:clamp(16px,2.5vw,26px);
    font-weight:700; letter-spacing:0.35em;
    background:linear-gradient(90deg,var(--cyan),var(--magenta));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent; text-transform:uppercase;
  }
  #title-block p { font-size:10px; letter-spacing:0.2em; color:var(--text-dim); margin-top:4px; text-transform:uppercase; }

  #status { position:absolute; top:32px; right:40px; display:flex; align-items:center; gap:8px; font-family:'Space Mono',monospace; font-size:11px; letter-spacing:0.15em; color:var(--text-dim); text-transform:uppercase; }
  #status-dot { width:7px; height:7px; border-radius:50%; background:#333; transition:background .3s,box-shadow .3s; }
  #status-dot.live { background:var(--cyan); box-shadow:0 0 10px var(--cyan); animation:pdot 1.5s ease-in-out infinite; }
  @keyframes pdot { 0%,100%{box-shadow:0 0 6px var(--cyan)} 50%{box-shadow:0 0 18px var(--cyan),0 0 32px var(--cyan)} }

  #controls { position:absolute; bottom:32px; left:40px; pointer-events:all; display:flex; flex-direction:column; gap:12px; }
  .ctrl-row { display:flex; align-items:center; gap:14px; }
  .ctrl-label { font-family:'Space Mono',monospace; font-size:9px; letter-spacing:0.2em; color:var(--text-dim); text-transform:uppercase; width:56px; }
  .ctrl-slider { -webkit-appearance:none; appearance:none; width:120px; height:3px; background:rgba(0,255,220,0.12); border-radius:2px; outline:none; cursor:pointer; }
  .ctrl-slider::-webkit-slider-thumb { -webkit-appearance:none; width:12px; height:12px; border-radius:50%; background:var(--cyan); box-shadow:0 0 8px var(--cyan); cursor:grab; }
  .ctrl-val { font-family:'Space Mono',monospace; font-size:10px; color:var(--cyan); min-width:32px; }

  #btn-row { position:absolute; bottom:32px; right:40px; display:flex; gap:12px; pointer-events:all; }
  .btn { background:var(--ui-bg); border:1px solid var(--border); border-radius:3px; padding:10px 22px; font-family:'Space Mono',monospace; font-size:11px; letter-spacing:0.15em; text-transform:uppercase; color:var(--text); cursor:pointer; transition:all .2s; }
  .btn:hover { border-color:var(--cyan); color:var(--cyan); box-shadow:0 0 16px rgba(0,255,220,0.25); transform:translateY(-1px); }
  .btn.primary { border-color:rgba(0,255,220,0.35); color:var(--cyan); }
  .btn:active { transform:scale(0.97); }

  #freq-bar { position:absolute; bottom:0; left:0; right:0; height:60px; pointer-events:none; opacity:0.5; }

  #onboard {
    position:fixed; inset:0; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:22px;
    z-index:20; background:radial-gradient(ellipse at center,rgba(1,3,10,.65) 0%,rgba(1,2,6,.97) 100%);
    backdrop-filter:blur(4px); transition:opacity .8s;
  }
  #onboard.gone { opacity:0; pointer-events:none; }
  #onboard h2 {
    font-family:'Space Mono',monospace; font-size:clamp(26px,5vw,54px); font-weight:700;
    letter-spacing:0.3em; text-align:center;
    background:linear-gradient(135deg,var(--cyan),var(--magenta));
    -webkit-background-clip:text; -webkit-text-fill-color:transparent;
    animation:glow 3s ease-in-out infinite alternate;
  }
  @keyframes glow { from{filter:brightness(1)} to{filter:brightness(1.3) drop-shadow(0 0 22px rgba(0,255,220,.5))} }
  #onboard p { font-size:clamp(13px,1.5vw,16px); letter-spacing:0.1em; color:var(--text-dim); text-align:center; max-width:480px; line-height:1.9; }
  #onboard .sub { font-family:'Space Mono',monospace; font-size:11px; color:rgba(0,180,160,.45); letter-spacing:0.15em; text-transform:uppercase; margin-top:4px; }

  #btn-start {
    margin-top:8px; background:transparent; border:1px solid var(--cyan); border-radius:3px;
    padding:14px 52px; font-family:'Space Mono',monospace; font-size:13px;
    letter-spacing:0.25em; text-transform:uppercase; color:var(--cyan); cursor:pointer;
    position:relative; overflow:hidden; transition:box-shadow .3s,transform .2s;
  }
  #btn-start::before {
    content:''; position:absolute; inset:0;
    background:linear-gradient(90deg,transparent,rgba(0,255,220,.12),transparent);
    transform:translateX(-100%); animation:scanline 2s linear infinite;
  }
  @keyframes scanline { to{transform:translateX(100%)} }
  #btn-start:hover { box-shadow:0 0 32px rgba(0,255,220,.35),inset 0 0 20px rgba(0,255,220,.06); transform:scale(1.03); }

  #beat-flash {
    position:fixed; inset:0; pointer-events:none; opacity:0; z-index:5;
    background: radial-gradient(ellipse at 38% 50%,rgba(0,255,220,.09) 0%,transparent 60%),
                radial-gradient(ellipse at 62% 50%,rgba(255,0,200,.09) 0%,transparent 60%);
    transition:opacity .05s;
  }
  #beat-flash.flash { opacity:1; }

  #tooltip {
    position:absolute; top:50%; left:50%; transform:translate(-50%,-50%);
    font-family:'Space Mono',monospace; font-size:11px; letter-spacing:0.2em;
    color:var(--text-dim); text-transform:uppercase; pointer-events:none;
    opacity:0; transition:opacity 1s; text-align:center; line-height:1.8;
  }
  #tooltip.show { opacity:1; }
</style>
</head>
<body>

<canvas id="c"></canvas>
<canvas id="freq-bar"></canvas>
<div id="beat-flash"></div>

<div id="onboard">
  <h2>PARTICULA</h2>
  <p>A physics-based cyberpunk particle universe.<br>Reacts to any audio in real time.</p>
  <p class="sub">Spotify &middot; YouTube &middot; Local audio &middot; Anything</p>
  <button id="btn-start">Initialize System</button>
</div>

<div id="ui">
  <div id="title-block">
    <h1>Particula</h1>
    <p>Cyberpunk Particle Visualizer</p>
  </div>
  <div id="status">
    <div id="status-dot"></div>
    <span id="status-text">Standby</span>
  </div>
  <div id="controls">
    <div class="ctrl-row">
      <span class="ctrl-label">Gravity</span>
      <input type="range" class="ctrl-slider" id="sl-gravity" min="0" max="100" value="40">
      <span class="ctrl-val" id="val-gravity">40</span>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">Particles</span>
      <input type="range" class="ctrl-slider" id="sl-count" min="500" max="12000" step="500" value="6000">
      <span class="ctrl-val" id="val-count">6k</span>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">Trails</span>
      <input type="range" class="ctrl-slider" id="sl-trail" min="1" max="20" value="8">
      <span class="ctrl-val" id="val-trail">8</span>
    </div>
    <div class="ctrl-row">
      <span class="ctrl-label">Force</span>
      <input type="range" class="ctrl-slider" id="sl-force" min="10" max="200" value="80">
      <span class="ctrl-val" id="val-force">80</span>
    </div>
  </div>
  <div id="btn-row">
    <button class="btn" id="btn-mic">Microphone</button>
    <button class="btn primary" id="btn-system">System Audio</button>
  </div>
  <div id="tooltip"></div>
</div>

<script>
"use strict";

// ── CANVAS ────────────────────────────────────
const canvas  = document.getElementById('c');
const ctx     = canvas.getContext('2d');
const fcanvas = document.getElementById('freq-bar');
const fctx    = fcanvas.getContext('2d');

let W = 0, H = 0;
function resize() {
  W = canvas.width = fcanvas.width = window.innerWidth;
  H = canvas.height = window.innerHeight;
  fcanvas.height = 60;
}
resize();
window.addEventListener('resize', () => { resize(); initParticles(); });

// ── CYBERPUNK PALETTE — locked neon hues ─────
const HUES = [185, 300, 55, 0, 140]; // cyan, magenta, yellow, red, green

// ── PARTICLE BUFFERS ──────────────────────────
const MAX    = 14000;
const px     = new Float32Array(MAX);
const py     = new Float32Array(MAX);
const pvx    = new Float32Array(MAX);
const pvy    = new Float32Array(MAX);
const pmass  = new Float32Array(MAX);
const phue   = new Uint8Array(MAX);   // index into HUES[]
const pshape = new Uint8Array(MAX);   // 0=crossdot  1=diamond  2=spark
let   pCount = 0;

// ── AUDIO STATE ───────────────────────────────
let audioCtx, analyser, fftData;
let audioActive = false;
let bass = 0, mids = 0, highs = 0, vol = 0;
let beatHistory = [], lastBeat = 0;

// ── FX STATE ──────────────────────────────────
let chromaOff  = 0;
let glitchLeft = 0;
const shockwaves = [];

// ── CONTROLS ──────────────────────────────────
let gravityMul  = 0.4;
let trailAlpha  = 8;
let forceMul    = 80;
let targetCount = 6000;

// ── MOUSE ─────────────────────────────────────
const mouse = { x: 0, y: 0, down: false };
window.addEventListener('mousemove', e => { mouse.x = e.clientX - W/2; mouse.y = e.clientY - H/2; });
window.addEventListener('mousedown', () => { mouse.down = true; });
window.addEventListener('mouseup',   () => { mouse.down = false; });

// ── AUDIO HELPERS ─────────────────────────────
function avgSlice(arr, s, e) {
  let t = 0;
  for (let i = s; i < e; i++) t += arr[i];
  return t / ((e - s) * 255);
}

function setupAnalyser(stream) {
  if (audioCtx) audioCtx.close();
  audioCtx = new (window.AudioContext || window.webkitAudioContext)();
  const src = audioCtx.createMediaStreamSource(stream);
  analyser  = audioCtx.createAnalyser();
  analyser.fftSize = 2048;
  analyser.smoothingTimeConstant = 0.82;
  fftData = new Uint8Array(analyser.frequencyBinCount);
  src.connect(analyser);
  audioActive = true;
  document.getElementById('status-dot').classList.add('live');
}

function analyzeAudio() {
  if (!analyser) return;
  analyser.getByteFrequencyData(fftData);
  bass  = avgSlice(fftData,   0,  12);
  mids  = avgSlice(fftData,  12, 120);
  highs = avgSlice(fftData, 120, 280);
  vol   = avgSlice(fftData,   0, 280);
  beatHistory.push(bass);
  if (beatHistory.length > 60) beatHistory.shift();
  const avg = beatHistory.reduce((a, b) => a + b, 0) / beatHistory.length;
  if (bass > avg * 1.45 && Date.now() - lastBeat > 200) {
    lastBeat = Date.now();
    onBeat();
  }
}

function idlePulse() {
  const t = Date.now() / 1000;
  bass  = 0.15 + Math.sin(t * 0.7)  * 0.08;
  mids  = 0.10 + Math.sin(t * 1.3)  * 0.06;
  highs = 0.05 + Math.sin(t * 2.1)  * 0.04;
  vol   = (bass + mids + highs) / 3;
}

function onBeat() {
  const fl = document.getElementById('beat-flash');
  fl.classList.add('flash');
  setTimeout(() => fl.classList.remove('flash'), 80);
  chromaOff  = 3 + bass * 9;
  if (Math.random() < 0.4) glitchLeft = Math.floor(4 + Math.random() * 8);
  spawnShockwave(W/2 + mouse.x * 0.2, H/2 + mouse.y * 0.2);
}

function spawnShockwave(x, y) {
  shockwaves.push({ x, y, r: 0, maxR: Math.min(W, H) * 0.6, str: (bass + 0.3) * forceMul * 2 });
}

// ── PARTICLE HELPERS ──────────────────────────
function resetParticle(i, spread) {
  const angle = Math.random() * Math.PI * 2;
  const r     = spread ? Math.random() * Math.min(W, H) * 0.44 : 5;
  px[i]     = W/2 + Math.cos(angle) * r;
  py[i]     = H/2 + Math.sin(angle) * r;
  pvx[i]    = (Math.random() - 0.5) * 1.5;
  pvy[i]    = (Math.random() - 0.5) * 1.5;
  pmass[i]  = 0.5 + Math.random() * 1.5;
  phue[i]   = Math.floor(Math.random() * HUES.length);
  const roll = Math.random();
  pshape[i] = roll < 0.60 ? 0 : roll < 0.85 ? 1 : 2;
}

function initParticles() {
  pCount = Math.min(targetCount, MAX);
  for (let i = 0; i < pCount; i++) resetParticle(i, true);
}

function diamond(x, y, r) {
  ctx.beginPath();
  ctx.moveTo(x,     y - r);
  ctx.lineTo(x + r, y    );
  ctx.lineTo(x,     y + r);
  ctx.lineTo(x - r, y    );
  ctx.closePath();
}

// ── RENDER LOOP ───────────────────────────────
let frame = 0, lastTS = 0, running = false;

function loop(ts) {
  if (!running) return;
  requestAnimationFrame(loop);
  const dt = Math.min((ts - lastTS) / 16.67, 3);
  lastTS = ts;
  frame++;

  if (!audioActive) idlePulse();
  else analyzeAudio();

  const energy     = vol;
  const bassFactor = bass * gravityMul * forceMul;
  const midFactor  = mids * 0.5;
  const highFactor = highs * 2;
  const trailA     = 0.055 + (trailAlpha / 20) * 0.13;

  // Background fade
  ctx.fillStyle = `rgba(1,2,8,${trailA})`;
  ctx.fillRect(0, 0, W, H);

  // Scanline grid (every 4th frame for perf)
  if (frame % 4 === 0) {
    ctx.save();
    ctx.strokeStyle = `rgba(0,255,220,${0.015 + energy * 0.02})`;
    ctx.lineWidth = 0.4;
    for (let gx = 0; gx < W; gx += 48) { ctx.beginPath(); ctx.moveTo(gx,0); ctx.lineTo(gx,H); ctx.stroke(); }
    for (let gy = 0; gy < H; gy += 48) { ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(W,gy); ctx.stroke(); }
    ctx.restore();
  }

  // Shockwave rings
  for (let s = shockwaves.length - 1; s >= 0; s--) {
    const sw = shockwaves[s];
    sw.r += 10 * dt;
    if (sw.r > sw.maxR) { shockwaves.splice(s, 1); continue; }
    const prog = sw.r / sw.maxR;
    const a    = (1 - prog) * 0.75;
    ctx.beginPath(); ctx.arc(sw.x, sw.y, sw.r, 0, Math.PI*2);
    ctx.strokeStyle = `rgba(0,255,220,${a * 0.7})`; ctx.lineWidth = 3*(1-prog); ctx.stroke();
    if (sw.r > 12) {
      ctx.beginPath(); ctx.arc(sw.x, sw.y, sw.r * 0.72, 0, Math.PI*2);
      ctx.strokeStyle = `rgba(255,0,200,${a * 0.35})`; ctx.lineWidth = 1.5*(1-prog); ctx.stroke();
    }
    ctx.save(); ctx.translate(sw.x, sw.y);
    ctx.strokeStyle = `rgba(0,255,220,${a * 0.22})`; ctx.lineWidth = 1;
    for (let sp = 0; sp < 8; sp++) {
      const ang = (sp/8) * Math.PI*2 + frame*0.025;
      ctx.beginPath();
      ctx.moveTo(Math.cos(ang)*sw.r*0.28, Math.sin(ang)*sw.r*0.28);
      ctx.lineTo(Math.cos(ang)*sw.r,       Math.sin(ang)*sw.r);
      ctx.stroke();
    }
    ctx.restore();
  }

  // Particle physics + draw
  const mgx = W/2 + mouse.x;
  const mgy = H/2 + mouse.y;

  for (let i = 0; i < pCount; i++) {
    const cx = px[i] - W/2;
    const cy = py[i] - H/2;
    const dc = Math.sqrt(cx*cx + cy*cy) + 0.001;

    // Gravity toward center
    const grav = (bassFactor * 0.12 + 0.3) * gravityMul;
    let ax = -cx / dc * grav / pmass[i];
    let ay = -cy / dc * grav / pmass[i];

    // Mouse gravity/repulsion
    const mdx = px[i] - mgx;
    const mdy = py[i] - mgy;
    const dm  = Math.sqrt(mdx*mdx + mdy*mdy) + 1;
    if (dm < 200) {
      const mf = mouse.down ? -7 : 2.5;
      ax += mdx/dm * mf * energy / pmass[i];
      ay += mdy/dm * mf * energy / pmass[i];
    }

    // Rotational torque from mids
    ax += (-cy/dc) * midFactor * 0.04;
    ay +=  (cx/dc) * midFactor * 0.04;

    // High freq jitter
    if (highs > 0.08) {
      ax += (Math.random()-0.5) * highs * highFactor * 0.28;
      ay += (Math.random()-0.5) * highs * highFactor * 0.28;
    }

    // Shockwave push
    for (const sw of shockwaves) {
      const sdx = px[i] - sw.x;
      const sdy = py[i] - sw.y;
      const sd  = Math.sqrt(sdx*sdx + sdy*sdy) + 1;
      const rim = Math.abs(sd - sw.r);
      if (rim < 42) {
        const f = (42-rim)/42 * sw.str * 0.02;
        ax += sdx/sd * f / pmass[i];
        ay += sdy/sd * f / pmass[i];
      }
    }

    // Integrate
    pvx[i] += ax * dt;
    pvy[i] += ay * dt;
    pvx[i] *= 0.992;
    pvy[i] *= 0.992;

    // Speed cap
    let spd = Math.sqrt(pvx[i]*pvx[i] + pvy[i]*pvy[i]);
    const maxSpd = 6 + energy * 8;
    if (spd > maxSpd) { pvx[i] = pvx[i]/spd*maxSpd; pvy[i] = pvy[i]/spd*maxSpd; spd = maxSpd; }

    px[i] += pvx[i] * dt;
    py[i] += pvy[i] * dt;

    // Wrap
    if (px[i] < -20)    px[i] = W + 20;
    if (px[i] > W + 20) px[i] = -20;
    if (py[i] < -20)    py[i] = H + 20;
    if (py[i] > H + 20) py[i] = -20;

    // ── DRAW ──────────────────────────────────
    const hue      = HUES[phue[i]];
    const spdRatio = Math.min(spd / (maxSpd * 0.8), 1);
    const sz       = (0.55 + pmass[i] * 0.5) * (1 + energy * 1.8);
    const lum      = 52 + energy*36 + spdRatio*18;
    const sat      = 90 + energy*10;
    const alp      = 0.55 + energy*0.45;
    const ca       = chromaOff * (pmass[i] > 1 ? 1 : 0.4);

    if (pshape[i] === 1) {
      // DIAMOND
      if (ca > 0.5) {
        ctx.save();
        ctx.translate(px[i]+ca, py[i]); diamond(0,0,sz*1.35);
        ctx.fillStyle = `rgba(0,255,220,${alp*0.22})`; ctx.fill();
        ctx.translate(-ca*2, 0); diamond(0,0,sz*1.35);
        ctx.fillStyle = `rgba(255,0,200,${alp*0.22})`; ctx.fill();
        ctx.restore();
      }
      diamond(px[i], py[i], sz*1.1);
      ctx.fillStyle = `hsla(${hue},${sat}%,${lum}%,${alp})`; ctx.fill();
      ctx.beginPath(); ctx.arc(px[i], py[i], sz*0.32, 0, Math.PI*2);
      ctx.fillStyle = `hsla(${hue},100%,95%,${alp})`; ctx.fill();
      if (energy > 0.12) {
        const gr = ctx.createRadialGradient(px[i],py[i],0, px[i],py[i],sz*4.5);
        gr.addColorStop(0, `hsla(${hue},100%,70%,${energy*0.22})`);
        gr.addColorStop(1, 'transparent');
        ctx.beginPath(); ctx.arc(px[i],py[i],sz*4.5,0,Math.PI*2); ctx.fillStyle=gr; ctx.fill();
      }

    } else if (pshape[i] === 2) {
      // SPARK STREAK
      if (spd > 0.4) {
        const sLen = Math.min(spd*3.8 + energy*9, 30);
        const nx   = -pvx[i]/spd;
        const ny   = -pvy[i]/spd;
        const sg   = ctx.createLinearGradient(px[i],py[i], px[i]+nx*sLen, py[i]+ny*sLen);
        sg.addColorStop(0,   `hsla(${hue},100%,${lum}%,${alp})`);
        sg.addColorStop(0.4, `hsla(${hue},100%,${lum}%,${alp*0.5})`);
        sg.addColorStop(1,   'transparent');
        ctx.beginPath(); ctx.moveTo(px[i],py[i]); ctx.lineTo(px[i]+nx*sLen, py[i]+ny*sLen);
        ctx.strokeStyle=sg; ctx.lineWidth=sz*0.85; ctx.lineCap='round'; ctx.stroke();
        ctx.beginPath(); ctx.arc(px[i],py[i],sz*0.65,0,Math.PI*2);
        ctx.fillStyle=`hsla(${hue},100%,92%,${alp})`; ctx.fill();
      }

    } else {
      // CROSSHAIR DOT
      const cLen = sz*2.2 + spdRatio*3;
      ctx.save();
      ctx.strokeStyle = `hsla(${hue},100%,${lum}%,${alp*0.45})`; ctx.lineWidth = 0.6;
      ctx.beginPath();
      ctx.moveTo(px[i]-cLen, py[i]); ctx.lineTo(px[i]+cLen, py[i]);
      ctx.moveTo(px[i], py[i]-cLen); ctx.lineTo(px[i], py[i]+cLen);
      ctx.stroke(); ctx.restore();
      if (ca > 0.5) {
        ctx.beginPath(); ctx.arc(px[i]+ca, py[i], sz*0.8, 0, Math.PI*2);
        ctx.fillStyle=`rgba(0,255,220,${alp*0.28})`; ctx.fill();
        ctx.beginPath(); ctx.arc(px[i]-ca, py[i], sz*0.8, 0, Math.PI*2);
        ctx.fillStyle=`rgba(255,0,200,${alp*0.28})`; ctx.fill();
      }
      ctx.beginPath(); ctx.arc(px[i],py[i],sz,0,Math.PI*2);
      ctx.fillStyle=`hsla(${hue},${sat}%,${lum}%,${alp})`; ctx.fill();
      ctx.beginPath(); ctx.arc(px[i],py[i],sz*0.38,0,Math.PI*2);
      ctx.fillStyle=`rgba(255,255,255,${alp*0.75})`; ctx.fill();
      if (energy > 0.12 || spdRatio > 0.35) {
        const gr2 = ctx.createRadialGradient(px[i],py[i],sz*0.5, px[i],py[i],sz*3.8);
        gr2.addColorStop(0, `hsla(${hue},100%,70%,${energy*0.16+spdRatio*0.08})`);
        gr2.addColorStop(1, 'transparent');
        ctx.beginPath(); ctx.arc(px[i],py[i],sz*3.8,0,Math.PI*2); ctx.fillStyle=gr2; ctx.fill();
      }
    }
  }

  // Bloom
  if (energy > 0.14) {
    const b1 = ctx.createRadialGradient(W/2-chromaOff*0.5,H/2,0, W/2-chromaOff*0.5,H/2, 180+bass*230);
    b1.addColorStop(0, `rgba(0,255,220,${energy*0.055})`); b1.addColorStop(1,'transparent');
    ctx.fillStyle=b1; ctx.fillRect(0,0,W,H);
    const b2 = ctx.createRadialGradient(W/2+chromaOff*0.5,H/2,0, W/2+chromaOff*0.5,H/2, 140+bass*180);
    b2.addColorStop(0, `rgba(255,0,200,${energy*0.04})`); b2.addColorStop(1,'transparent');
    ctx.fillStyle=b2; ctx.fillRect(0,0,W,H);
  }

  // Glitch bars
  if (glitchLeft > 0) {
    glitchLeft--;
    for (let b = 0; b < 3; b++) {
      const gy2 = Math.random() * H;
      const gh  = 1 + Math.random() * 5;
      ctx.fillStyle = `rgba(0,255,220,${0.05 + Math.random()*0.07})`;
      ctx.fillRect(0, gy2, W, gh);
    }
  }

  chromaOff *= 0.82;
  if (chromaOff < 0.05) chromaOff = 0;

  drawFreqBars();
}

function drawFreqBars() {
  if (!analyser) return;
  fctx.clearRect(0, 0, W, 60);
  const bars = 128;
  const bw   = W / bars;
  for (let i = 0; i < bars; i++) {
    const v   = fftData[i] / 255;
    const h   = v * 54;
    const hue = HUES[i % HUES.length];
    const br  = 45 + v * 44;
    fctx.fillStyle = `hsla(${hue},100%,${br}%,${0.3 + v*0.7})`;
    fctx.fillRect(i*bw, 60-h, bw-1, h);
    if (h > 2) {
      fctx.fillStyle = `hsla(${hue},100%,92%,${v*0.85})`;
      fctx.fillRect(i*bw, 60-h-2, bw-1, 2);
    }
  }
}

// ── SLIDER BINDINGS ───────────────────────────
function bindSlider(id, valId, fn) {
  const sl = document.getElementById(id);
  const vl = document.getElementById(valId);
  sl.addEventListener('input', () => fn(+sl.value, vl));
}
bindSlider('sl-gravity','val-gravity',(v,el)=>{ gravityMul=v/100; el.textContent=v; });
bindSlider('sl-trail',  'val-trail',  (v,el)=>{ trailAlpha=v; el.textContent=v; });
bindSlider('sl-force',  'val-force',  (v,el)=>{ forceMul=v; el.textContent=v; });
bindSlider('sl-count',  'val-count',  (v,el)=>{
  targetCount=v;
  el.textContent = v>=1000 ? (v/1000).toFixed(v%1000===0?0:1)+'k' : v;
  initParticles();
});

// ── BUTTON HANDLERS ───────────────────────────
document.getElementById('btn-start').addEventListener('click', () => {
  const ob = document.getElementById('onboard');
  ob.classList.add('gone');
  setTimeout(() => { ob.style.display = 'none'; }, 850);
  initParticles();
  running = true;
  requestAnimationFrame(loop);
});

document.getElementById('btn-mic').addEventListener('click', async () => {
  try {
    const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
    setupAnalyser(stream);
    document.getElementById('status-text').textContent = 'Microphone';
    showTip('Microphone active');
  } catch(e) { showTip('Microphone access denied'); }
});

document.getElementById('btn-system').addEventListener('click', async () => {
  try {
    const stream = await navigator.mediaDevices.getDisplayMedia({ video: true, audio: true });
    setupAnalyser(stream);
    document.getElementById('status-text').textContent = 'System Audio';
    showTip('System audio active — play any music!');
  } catch(e) { showTip('Screen share cancelled or unsupported'); }
});

let tipTimer;
function showTip(msg) {
  const el = document.getElementById('tooltip');
  el.textContent = msg; el.classList.add('show');
  clearTimeout(tipTimer); tipTimer = setTimeout(()=>el.classList.remove('show'), 3000);
}

window.addEventListener('keydown', e => {
  if (e.key === ' ') spawnShockwave(W/2, H/2);
  if (e.key === 'r' || e.key === 'R') initParticles();
});
</script>
